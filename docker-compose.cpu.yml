# CPU-only override — run transcription without an NVIDIA GPU.
#
#   docker compose -f docker-compose.yml -f docker-compose.cpu.yml up -d
#
# Removes the NVIDIA device reservation so the GPU worker starts on any machine.
# The zabt-gpu-worker image auto-detects the absence of CUDA and runs faster-whisper
# with int8 compute on CPU.
#
# TRADE-OFF: CPU transcription is SLOW — expect roughly 1-5x the audio duration per
# file depending on cores and the WHISPER_MODEL size. For usable CPU performance set a
# smaller model in .env, e.g. WHISPER_MODEL=base or WHISPER_MODEL=small. Diarization
# (pyannote) is also markedly slower on CPU.
services:
  worker-gpu:
    # Drop the whole GPU reservation so the container starts on any host.
    deploy: !reset null
