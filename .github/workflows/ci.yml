name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: ruff check
        run: uvx ruff check .
      - name: ruff format --check (advisory)
        continue-on-error: true
        run: uvx ruff format --check .

  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: zabt_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/zabt_test
      REDIS_URL: redis://localhost:6379/0
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_JWT_SECRET: test-secret
      OPENAI_API_KEY: test-key
      OPENAI_BASE_URL: https://example.invalid/v1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install backend deps
        working-directory: backend
        run: uv sync
      - name: Run unit tests
        working-directory: backend
        # Generate an ephemeral Fernet key at runtime (keeps secret-shaped strings out of the repo)
        run: |
          TOKEN_ENCRYPTION_KEY="$(uv run python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')"
          export TOKEN_ENCRYPTION_KEY
          uv run pytest tests/unit -q

  frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Type-check frontend
        working-directory: frontend-2
        run: npx tsc --noEmit
      - name: Lint frontend
        working-directory: frontend-2
        run: npx eslint . || true
