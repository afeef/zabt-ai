    { name = "boto3" },
    { name = "fastapi" },
    { name = "ffmpeg-python" },
    { name = "httpx" },
    { name = "imagehash" },
    { name = "ollama" },
    { name = "openai" },
    { name = "pillow" },
    { name = "pydantic" },
    { name = "pydantic-settings" },
    { name = "rich" },
    { name = "typer" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
dev = [
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "pytest-mock" },
    { name = "ruff" },
]
ml = [
    { name = "easyocr" },
    { name = "opencv-python-headless" },
    { name = "scenedetect" },
]
ocr = [
    { name = "easyocr" },
]
scene = [
    { name = "opencv-python-headless" },
    { name = "scenedetect" },
]

