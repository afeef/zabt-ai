# Opt-in: local MinIO container with bucket initialization.
# Include to run with local object storage; omit to use S3 from .env.
services:
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_NOTIFY_WEBHOOK_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_PRIMARY: "http://api:8000/api/v1/webhooks/minio"
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_PRIMARY: "Bearer ${MINIO_WEBHOOK_SECRET:-change-me-in-production}"
      MINIO_NOTIFY_WEBHOOK_QUEUE_DIR_PRIMARY: "/data/.minio/events"
      MINIO_NOTIFY_WEBHOOK_QUEUE_LIMIT_PRIMARY: "100000"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/zabt-ai-bucket;
      mc event add myminio/zabt-ai-bucket arn:minio:sqs::PRIMARY:webhook --event put --ignore-existing;
      echo 'Bucket event subscription configured';
      "

  api:
    environment:
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio:9000

  worker:
    environment:
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio:9000

volumes:
  minio_data:
