# Opt-in: local GPU worker for transcription. Requires NVIDIA Container Toolkit.
# Include to run transcription on local GPU; omit to use RunPod from .env.
services:
  worker-gpu:
    image: afeef/zabt-gpu-worker:latest
    restart: unless-stopped
    build:
      context: ./zabt-gpu-worker
    ports:
      - "8001:8001"
    environment:
      MODE: local
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      DIARIZATION_MODEL: ${DIARIZATION_MODEL:-pyannote/speaker-diarization-3.1}
      MEDASR_MODEL: ${MEDASR_MODEL:-google/medasr}
      HF_TOKEN: ${HF_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      DIARIZATION_MIN_SPEAKERS: ${DIARIZATION_MIN_SPEAKERS:-1}
      DIARIZATION_MAX_SPEAKERS: ${DIARIZATION_MAX_SPEAKERS:-10}
      SENTRY_ENVIRONMENT: local
      PORT: 8001
    volumes:
      - worker_model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker:
    environment:
      TRANSCRIPTION_BACKEND: gpu-local
      GPU_SERVICE_URL: http://worker-gpu:8001
    depends_on:
      - worker-gpu

volumes:
  worker_model_cache:
