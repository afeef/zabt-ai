# Local overlay. Adds the Next.js dev container, exposes the API directly,
# applies localhost URL overrides. No Kong.
services:
  web:
    restart: unless-stopped
    build:
      context: ./frontend-2
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./frontend-2:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    depends_on:
      - api

  # Expose the API directly on :8000 (no Kong locally).
  api:
    ports:
      - "8000:8000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/microsoft/callback}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}

  worker:
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/microsoft/callback}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}

  beat:
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/microsoft/callback}
