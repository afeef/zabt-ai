# Cloud / split-deployment override (advanced) — the architecture zabt.ai runs in
# production: a small VPS runs the API + workers, transcription runs on RunPod
# Serverless GPUs, and Postgres/object-storage are managed services.
#
#   docker compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#
# For this path, set in .env:
#   COMPOSE_PROFILES=            # empty — do NOT run the local db/minio/gpu/web
#   DATABASE_URL=postgresql+asyncpg://...    # managed Postgres (e.g. Supabase)
#   STORAGE_PROVIDER=s3
#   S3_ENDPOINT_URL=... S3_ACCESS_KEY_ID=... S3_SECRET_ACCESS_KEY=... S3_PUBLIC_URL=...
#   TRANSCRIPTION_BACKEND=runpod
#   RUNPOD_API_KEY=... RUNPOD_ENDPOINT_ID=...
#   APP_URL=https://app.your-domain    NEXT_PUBLIC_API_URL=https://api.your-domain/api/v1
#
# The frontend (web) is typically hosted separately (e.g. Vercel) in this topology, so
# it is not started here; run it locally with COMPOSE_PROFILES=local if you want it in
# a container.
#
# Kong is included as the single TLS entry point. It needs kong/kong.yml and TLS certs
# at kong/ssl/origin.pem + origin.key (see docs/advanced-runpod-split.md). Remove the
# kong service if you terminate TLS elsewhere (Cloudflare Tunnel, a reverse proxy, etc).

services:
  kong:
    image: kong:3.6
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "127.0.0.1:8100"
      KONG_LOG_LEVEL: notice
      KONG_SSL_CERT: /etc/kong/ssl/origin.pem
      KONG_SSL_CERT_KEY: /etc/kong/ssl/origin.key
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
      - ./kong/ssl:/etc/kong/ssl:ro
    ports:
      - "80:8000"
      - "443:8443"
    depends_on:
      - api

  api:
    # Behind Kong — no need to publish 8000 on the host in production.
    ports: !reset []
    environment:
      TRANSCRIPTION_BACKEND: ${TRANSCRIPTION_BACKEND:-runpod}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}

  worker:
    environment:
      TRANSCRIPTION_BACKEND: ${TRANSCRIPTION_BACKEND:-runpod}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}

  beat:
    # Same cloud overrides as worker (beat runs the same image + app.worker graph).
    # The full S3/OpenAI/etc. env now lives on the base beat service.
    environment:
      TRANSCRIPTION_BACKEND: ${TRANSCRIPTION_BACKEND:-runpod}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
