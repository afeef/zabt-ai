openapi: 3.1.0
info:
  title: WhisperX Meeting Upload & Transcription Contracts
  version: 1.0.0

paths:
  /api/v1/meetings/presigned-upload:
    post:
      summary: Request a Presigned S3/MinIO URL for Meeting Media Upload
      description: The frontend uses this to secure a temporary write-URL directly to the S3 bucket, bypassing backend memory loads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - content_type
              properties:
                filename:
                  type: string
                  example: "q4_planning.mp3"
                content_type:
                  type: string
                  example: "audio/mpeg"
      responses:
        "200":
          description: Successful Presigned URL Generation
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                    format: uri
                  file_key:
                    type: string
                    description: "The S3 object key to be referenced when creating the meeting record"
  
  /api/v1/meetings/:
    post:
      summary: Create Meeting Record & Trigger Transcription Worker
      description: After the frontend successfully PUTs the media file to the presigned S3 url, it calls this endpoint with the `file_key` to commit the record and enqueue the Celery job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - file_key
              properties:
                title:
                  type: string
                file_key:
                  type: string
                  description: "s3://zabt-media/users/1/1234.mp3"
      responses:
        "201":
          description: Meeting record created, Task Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                    example: "queued"
                  task_id:
                    type: string
                    description: "The Celery async task UUID"
