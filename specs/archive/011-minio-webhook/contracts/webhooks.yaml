# OpenAPI Contract: MinIO Webhook Endpoint
# Feature: 011-minio-webhook

openapi: "3.1.0"
info:
  title: Zabt Webhooks API
  version: "1.0.0"

paths:
  /api/v1/webhooks/minio:
    head:
      summary: MinIO health check (no auth required)
      description: |
        MinIO sends periodic HEAD requests to verify the webhook endpoint is reachable.
        These requests may not include the Authorization header (known MinIO behavior).
        Always responds 200 OK.
      responses:
        "200":
          description: Endpoint is healthy

    post:
      summary: Receive MinIO S3 bucket event notification
      description: |
        Called by MinIO when an object is created in the zabt-media bucket.
        Parses the S3 event payload, looks up the Meeting record by file_path,
        and triggers the Celery transcription task.

        Secured with a shared Bearer token configured in MINIO_WEBHOOK_SECRET.
      security:
        - webhookBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/S3EventNotification"
            example:
              EventName: "s3:ObjectCreated:Put"
              Key: "zabt-media/users/42/meetings/a1b2c3d4_recording.webm"
              Records:
                - eventName: "s3:ObjectCreated:Put"
                  s3:
                    bucket:
                      name: "zabt-media"
                    object:
                      key: "users/42/meetings/a1b2c3d4_recording.webm"
                      size: 15728640
                      contentType: "audio/webm"
      responses:
        "200":
          description: Event processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
              examples:
                triggered:
                  value:
                    status: "ok"
                    meeting_id: 42
                    message: "Processing triggered"
                skipped:
                  value:
                    status: "skipped"
                    meeting_id: null
                    message: "No pending meeting for this file"
        "401":
          description: Invalid or missing webhook secret
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Unauthorized"

components:
  securitySchemes:
    webhookBearer:
      type: http
      scheme: bearer
      description: "MINIO_WEBHOOK_SECRET value sent by MinIO in Authorization header"

  schemas:
    S3EventNotification:
      type: object
      properties:
        EventName:
          type: string
          example: "s3:ObjectCreated:Put"
        Key:
          type: string
          example: "zabt-media/users/42/meetings/a1b2c3d4_recording.webm"
        Records:
          type: array
          items:
            $ref: "#/components/schemas/S3EventRecord"

    S3EventRecord:
      type: object
      required: [eventName, s3]
      properties:
        eventName:
          type: string
          example: "s3:ObjectCreated:Put"
        s3:
          $ref: "#/components/schemas/S3Info"

    S3Info:
      type: object
      required: [bucket, object]
      properties:
        bucket:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: "zabt-media"
        object:
          type: object
          required: [key]
          properties:
            key:
              type: string
              description: "URL-encoded S3 object key"
              example: "users/42/meetings/a1b2c3d4_recording.webm"
            size:
              type: integer
              example: 15728640
            contentType:
              type: string
              example: "audio/webm"

    WebhookResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, skipped, error]
        meeting_id:
          type: integer
          nullable: true
        message:
          type: string
