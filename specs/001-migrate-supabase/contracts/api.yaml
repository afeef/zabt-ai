openapi: 3.1.0
info:
  title: Pareto AI Backend API
  description: Simplified backend architecture strictly dedicated to AI transcription and summarization tasks.
  version: 2.0.0
servers:
  - url: http://localhost:8000/api/v1
paths:
  /ai/transcribe:
    post:
      summary: Start an audio transcription task
      security:
        - SupabaseBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The audio file to transcribe
      responses:
        '202':
          description: Transcription task started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AITaskResponse'
        '401':
          description: Unauthorized (Missing or invalid Supabase JWT)
  
  /ai/summarize:
    post:
      summary: Start a text summarization task
      security:
        - SupabaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: The text payload to summarize
      responses:
        '202':
          description: Summarization task started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AITaskResponse'
        '401':
          description: Unauthorized (Missing or invalid Supabase JWT)

components:
  schemas:
    AITaskResponse:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, FAILED]
          
  securitySchemes:
    SupabaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter the JWT issued by the Hosted Supabase project. The backend verifies this using the project's JWT secret.
